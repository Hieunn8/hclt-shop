# Host Nginx config for AIVisionary on an existing VPS.
#
# Assumptions:
# - Host Nginx owns ports 80/443.
# - AIVisionary frontend container listens on 127.0.0.1:3000.
# - AIVisionary CMS container listens on 127.0.0.1:1337.
# - Existing services are preserved:
#   - /api/ -> Spring Boot 127.0.0.1:8080
#   - /tts/ and api.hieuchanlaptrinh.top -> FastAPI 127.0.0.1:8000
#   - n8n.hieuchanlaptrinh.top -> 127.0.0.1:5678
#   - llm.hieuchanlaptrinh.top -> 127.0.0.1:20128

map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
}

limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=forms:10m rate=3r/s;

upstream aivisionary_web {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream aivisionary_cms {
    server 127.0.0.1:1337;
    keepalive 16;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://hieuchanlaptrinh.top$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/hieuchanlaptrinh.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hieuchanlaptrinh.top/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://hieuchanlaptrinh.top$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name hieuchanlaptrinh.top www.hieuchanlaptrinh.top cms.hieuchanlaptrinh.top;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hieuchanlaptrinh.top www.hieuchanlaptrinh.top;

    ssl_certificate     /etc/letsencrypt/live/hieuchanlaptrinh.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hieuchanlaptrinh.top/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;
    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    location ~ /\.(?!well-known) {
        deny all;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Existing Spring Boot API.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Existing TTS tool path.
    location /tts/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 2M;
    }

    # AIVisionary Next.js frontend.
    location / {
        proxy_pass http://aivisionary_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 30s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cms.hieuchanlaptrinh.top;

    # Use a certificate that covers cms.hieuchanlaptrinh.top.
    # If the current cert only covers hieuchanlaptrinh.top, issue/expand it first:
    # certbot --nginx -d hieuchanlaptrinh.top -d www.hieuchanlaptrinh.top -d cms.hieuchanlaptrinh.top
    ssl_certificate     /etc/letsencrypt/live/hieuchanlaptrinh.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hieuchanlaptrinh.top/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;
    client_max_body_size 20M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location ~ /\.(?!well-known) {
        deny all;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://aivisionary_cms;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 30s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.hieuchanlaptrinh.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
