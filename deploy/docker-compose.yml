services:
  frontend:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
    env_file:
      - path: ./env/frontend.env
        required: false
    expose:
      - "3000"
    mem_limit: 768m
    mem_reservation: 256m
    cpus: 1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 6
    networks: [aivisionary_internal]
    logging:
      options: { max-size: "10m", max-file: "5" }

  cms:
    build:
      context: ..
      dockerfile: apps/cms/Dockerfile
    env_file:
      - path: ./env/cms.env
        required: false
    expose:
      - "1337"
    volumes:
      - cms_uploads:/opt/aivisionary/data/uploads
    mem_limit: 1536m
    mem_reservation: 512m
    cpus: 1.5
    restart: unless-stopped
    networks: [aivisionary_internal]
    logging:
      options: { max-size: "10m", max-file: "5" }

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      frontend:
        condition: service_healthy
      cms:
        condition: service_started
    mem_limit: 256m
    mem_reservation: 64m
    cpus: 0.5
    restart: unless-stopped
    networks: [aivisionary_internal]

  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

networks:
  aivisionary_internal:
    driver: bridge

volumes:
  cms_uploads:
  certbot_www:
  certbot_conf:
